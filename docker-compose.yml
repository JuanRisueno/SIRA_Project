# Este archivo define y ejecuta todos los servicios del proyecto SIRA.
version: '3.8'

services:

  # 1. Base de Datos: PostgreSQL (sira_db)
  # ----------------------------------------
  db:
    image: postgres:16-alpine      # Imagen ligera, estable y oficial.
    container_name: sira_db        # Nombre de contenedor fijo para conexión y logs.
    restart: unless-stopped        # Reinicia si el contenedor cae.
    volumes:
      # Volumen 1: Persistencia de Datos (Volumen Nombrado).
      - postgres_data:/var/lib/postgresql/data/
      
      # Volumen 2: Inicialización Automática de la BBDD (Bind Mount).
      - ./backend/database:/docker-entrypoint-initdb.d 
      
    networks:
      - sira-network               # Conexión a la red interna.
    environment:
      # Variables leídas del archivo .env
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. API de la Aplicación (Python/FastAPI)
  # -------------------------------------
  api:
    build: ./backend               # Construye la imagen desde la carpeta 'backend'.
    container_name: sira_api
    restart: unless-stopped
    # ports:
    #    - "8000:8000"              # Todo pasa ahora por el puerto 8085 (Nginx)
    depends_on:
      db:
        condition: service_healthy # Solo arranca cuando la BBDD está lista.
    volumes:
      - ./backend:/app
    networks:
      - sira-network
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - PYTHONUNBUFFERED=1
      
  # 3. Proxy Inverso (Nginx)
  # ----------------------------------
  nginx:
    image: nginx:latest            # Imagen oficial de Nginx.
    container_name: sira_nginx
    restart: unless-stopped
    ports:
      - "${SIRA_PORT:-8085}:80"                  # Puerto dinámico SIRA — gestionado vía .env
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - sira-network
    depends_on:
      - api

  # 4. Frontend Web (PHP + Apache)
  # ----------------------------------
  frontend:
    image: php:8.2-apache          # Imagen oficial de PHP con Apache.
    container_name: sira_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/var/www/html
    networks:
      - sira-network

# --- Definiciones de Red y Volúmenes ---

volumes:
  postgres_data:

networks:
  sira-network:
    driver: bridge